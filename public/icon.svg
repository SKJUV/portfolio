<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Subtle border -->
  <rect x="4" y="4" width="504" height="504" rx="92" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.3"/>

  <!-- Corner accent line top-left -->
  <path d="M 96 8 L 8 8 Q 8 8 8 96" fill="none" stroke="url(#accent)" stroke-width="4" stroke-linecap="round" opacity="0.6"/>

  <!-- Corner accent line bottom-right -->
  <path d="M 416 504 L 504 504 Q 504 504 504 416" fill="none" stroke="url(#accent)" stroke-width="4" stroke-linecap="round" opacity="0.6"/>

  <!-- Letter S -->
  <text x="148" y="360" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="280" font-weight="800" fill="url(#accent)" filter="url(#glow)" letter-spacing="-8">S</text>

  <!-- Letter J -->
  <text x="296" y="360" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="280" font-weight="800" fill="#e5e7eb" letter-spacing="-8">J</text>

  <!-- Small decorative dot -->
  <circle cx="270" cy="400" r="6" fill="url(#accent)" opacity="0.8"/>
</svg>
